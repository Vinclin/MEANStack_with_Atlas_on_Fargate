name: Copilot Autofix Auto-Merge

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  autofix-auto-merge:
    name: Auto-merge Copilot Autofix PRs
    runs-on: ubuntu-latest
    # Only run for PRs created by Copilot Autofix
    if: |
      github.actor == 'github-advanced-security[bot]' ||
      github.actor == 'copilot-autofix[bot]'

    steps:
      # Requires "Allow GitHub Actions to create and approve pull requests"
      # to be enabled in Settings > Actions > General.
      # GITHUB_TOKEN can approve these PRs because the PR author
      # (github-advanced-security[bot]) is a different identity.
      - name: Approve Copilot Autofix PR
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN }}

      # --auto enables merge only after all required status checks pass,
      # so no explicit CI check step is needed here.
      - name: Enable auto-merge for Copilot Autofix PR
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.AUTO_MERGE_TOKEN }}
